name: Server Deploy

on:
  push:
    branches: [master, main, stable]
    paths:
      - "server/**"
      - "public/**"
      - "tools/deploy.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/server-deploy.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to deploy
        required: true
        default: stable

permissions:
  contents: read

concurrency:
  group: production-server
  cancel-in-progress: false

jobs:
  deploy:
    name: Test and deploy to production server
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://gameofworlds.com/status
    if: github.repository == 'steveseguin/Game-of-Worlds'
    steps:
      - name: Checkout push ref
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v7.0.0

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Mock server smoke
        run: npm run test:integration

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.PROD_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_SSH_USER }}
          DEPLOY_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
        run: node tools/deploy.js --install

      - name: Verify public deployment status
        run: |
          curl --fail --silent --show-error https://gameofworlds.com/health
          curl --fail --silent --show-error https://gameofworlds.com/status

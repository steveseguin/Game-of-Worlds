name: Server Deploy

on:
  push:
    branches: [master, main, stable]
    paths:
      - "server/**"
      - "public/**"
      - "tools/deploy.js"
      - "tools/verify-production-status.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/server-deploy.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to deploy
        required: true
        default: stable

permissions:
  contents: read

concurrency:
  group: production-server
  # Deploys upload into the live application directory. Let an active deploy
  # finish so cancellation cannot leave client and server files at different
  # revisions; the queued run will deploy and verify the newest revision next.
  cancel-in-progress: false

jobs:
  deploy:
    name: Test and deploy to production server
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://gameofworlds.com/status
    if: github.repository == 'steveseguin/Game-of-Worlds'
    steps:
      - name: Checkout push ref
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v7.0.0

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Capture deployment target
        shell: bash
        env:
          DEPLOY_REF_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
          DEPLOY_REF_FULL: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
        run: |
          commit="$(git rev-parse HEAD)"
          {
            echo "DEPLOY_COMMIT=$commit"
            echo "DEPLOY_REF_NAME=$DEPLOY_REF_INPUT"
            echo "DEPLOY_REF=$DEPLOY_REF_FULL"
          } >> "$GITHUB_ENV"
          {
            echo "## Deployment target"
            echo
            echo "- Ref: \`$DEPLOY_REF_INPUT\`"
            echo "- Commit: \`$commit\`"
            echo "- Event: \`${{ github.event_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Mock server smoke
        run: npm run test:integration

      - name: Validate deploy configuration
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.PROD_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_SSH_USER }}
          DEPLOY_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing. Configure PROD_SSH_HOST, PROD_SSH_USER, and PROD_SSH_PASSWORD repository secrets."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            {
              echo "## Deployment configuration failed"
              echo
              echo "One or more SSH deploy secrets are missing."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Deploy SSH secrets are configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.PROD_SSH_HOST }}
          DEPLOY_USER: ${{ secrets.PROD_SSH_USER }}
          DEPLOY_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
        run: node tools/deploy.js --install

      - name: Verify public deployment status
        shell: bash
        run: EXPECTED_COMMIT="$DEPLOY_COMMIT" node tools/verify-production-status.js

      - name: Deployment failure summary
        if: failure()
        shell: bash
        run: |
          {
            echo "## Deployment failed"
            echo
            echo "- Ref: \`${DEPLOY_REF_NAME:-unknown}\`"
            echo "- Commit: \`${DEPLOY_COMMIT:-unknown}\`"
            echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "Check the first failed step above; deploy and status scripts emit specific error annotations when possible."
          } >> "$GITHUB_STEP_SUMMARY"

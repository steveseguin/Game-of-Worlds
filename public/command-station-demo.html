<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game of Words - Command Station Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="images/minilogo.png" />
    <link rel="stylesheet" href="css/command-station-demo.css" />
  </head>
  <body>
    <main class="station" data-alert="warning">
      <img
        class="station__shell"
        src="images/command-station/console-shell-v2.png"
        alt=""
        aria-hidden="true"
      />

      <section class="sensor-screen" aria-label="Animated tactical sensor">
        <canvas id="spaceSensor"></canvas>
        <div class="sensor-screen__glass" aria-hidden="true"></div>
        <div
          class="sensor-screen__reticle"
          id="sensorReticle"
          aria-hidden="true"
        ></div>
        <div class="sensor-caption">
          <span>SECTOR 42</span>
          <strong id="sensorTitle">BLACK-HOLE CONTACT</strong>
          <small id="sensorSubline"
            >Signal bend 91% | Fleet risk terminal</small
          >
        </div>
      </section>

      <aside class="left-readouts" aria-label="Sector details">
        <div class="readout">
          <span>OWNER</span>
          <strong>UNCLAIMED</strong>
        </div>
        <div class="readout">
          <span>HAZARD</span>
          <strong id="hazardReadout">GRAVITY WELL</strong>
        </div>
        <div class="readout">
          <span>OUTPUT</span>
          <strong>METAL +18 | CRYSTAL +31</strong>
        </div>
      </aside>

      <aside class="commander-screen" aria-live="polite">
        <div class="commander-video">
          <img
            src="images/command-station/commander-portrait-v2.png"
            alt=""
            aria-hidden="true"
          />
          <span class="commander-video__mouth" aria-hidden="true"></span>
          <span class="commander-video__ghost" aria-hidden="true"></span>
        </div>
        <div class="commander-copy">
          <div class="commander-copy__meta">
            <span id="messageType">STATUS</span>
            <span id="messageQueue">QUEUE 01</span>
          </div>
          <p id="messageText">Awaiting fleet telemetry.</p>
          <div class="waveform" id="waveform" aria-hidden="true"></div>
        </div>
      </aside>

      <div class="turn-strip" aria-label="Command status">
        <span>GOW COMMAND</span>
        <b>TURN 12</b>
        <span>NEXT 02:14</span>
      </div>

      <div class="event-tape" id="eventLog" aria-label="Event log">
        <div class="event-tape__row">Sensor feed initialized.</div>
        <div class="event-tape__row">Commander uplink carrier locked.</div>
      </div>

      <nav class="hotspot-bank" aria-label="Demo alert controls">
        <button type="button" data-event="probeLost">
          <span>Probe</span>
        </button>
        <button type="button" data-event="blackHole">
          <span>Hole</span>
        </button>
        <button type="button" data-event="asteroid">
          <span>Field</span>
        </button>
        <button type="button" data-event="colony">
          <span>Colony</span>
        </button>
        <button type="button" data-event="battle">
          <span>Battle</span>
        </button>
        <button type="button" data-event="research">
          <span>Lab</span>
        </button>
        <button type="button" id="autoCycle" aria-pressed="true">
          <span>Auto</span>
        </button>
      </nav>

      <div class="ambient-hardware" aria-hidden="true">
        <span class="hardware-light hardware-light--top-red"></span>
        <span class="hardware-light hardware-light--right-red"></span>
        <span class="hardware-light hardware-light--left-amber"></span>
        <span class="hardware-light hardware-light--right-amber-a"></span>
        <span class="hardware-light hardware-light--right-amber-b"></span>
        <span class="button-diode button-diode--probe"></span>
        <span class="button-diode button-diode--hole"></span>
        <span class="button-diode button-diode--colony"></span>
        <span class="button-diode button-diode--auto"></span>
        <div class="right-segment-meter">
          <span style="--i: 0"></span>
          <span style="--i: 1"></span>
          <span style="--i: 2"></span>
          <span style="--i: 3"></span>
          <span style="--i: 4"></span>
        </div>
      </div>

      <div class="spark-layer" id="sparkLayer" aria-hidden="true"></div>
      <div class="station__crt" aria-hidden="true"></div>
      <div class="station__noise" aria-hidden="true"></div>
      <div class="station__vignette" aria-hidden="true"></div>
    </main>

    <script src="js/command-station-demo.js"></script>
  </body>
</html>
